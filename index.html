<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Chat Reconstructor | Evidence Portal</title>
    <style>
        :root {
            --primary: #1A365D;
            --secondary: #3182ce;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            border-top: 8px solid var(--primary);
        }
        .icon { font-size: 50px; margin-bottom: 10px; }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 24px; }
        p { color: #4a5568; line-height: 1.6; margin-bottom: 30px; }
        .launch-btn {
            background-color: var(--secondary);
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
        }
        .launch-btn:hover {
            background-color: var(--primary);
            transform: translateY(-2px);
        }
        .footer { margin-top: 30px; font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚖️</div>
        <h1>Forensic Chat Reconstructor</h1>
        <p>
            Professional digital evidence ingestion system. 
            Automated timeline reconstruction and behavioral analysis 
            for encrypted communication exports.
        </p>
        <a href="#" class="launch-btn">ENTER INVESTIGATION DASHBOARD</a>
        <div class="footer">
            Case ID: #WH-2026-001 | Secure Forensic Environment
        </div>
    </div>
</body>
</html>
